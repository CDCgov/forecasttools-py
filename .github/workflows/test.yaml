name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Python tests and collect coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run tests
        run: |
          uv run pytest \
            --cov=cfa/stf/forecasttools \
            --cov-report=term \
            --cov-report=xml:cfa-stf-forecasttools-coverage.xml \
            tests/cfa/stf/forecasttools

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v7
        with:
          env_vars: OS,PYTHON
          fail_ci_if_error: true
          flags: cfa-stf-forecasttools
          files: cfa-stf-forecasttools-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
